<h2 class="text-2xl font-bold text-gray-900 mb-1">Create your account</h2>
<p class="text-gray-500 text-sm mb-6">Join Route Posts and connect with the world.</p>

<form (ngSubmit)="onSubmit()" class="space-y-4">
  <!-- Name -->
  <div class="relative">
    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
      <i class="fas fa-user"></i>
    </span>
    <input
      type="text"
      id="name"
      name="name"
      [(ngModel)]="registerData.name"
      placeholder="Full name"
      required
      class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm placeholder-gray-400"
    />
  </div>

  <!-- Email -->
  <div class="relative">
    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
      <i class="fas fa-envelope"></i>
    </span>
    <input
      type="email"
      id="email"
      name="email"
      [(ngModel)]="registerData.email"
      placeholder="Email address"
      required
      class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm placeholder-gray-400"
    />
  </div>

  <!-- Phone -->
  <div class="relative">
    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
      <i class="fas fa-phone"></i>
    </span>
    <input
      type="tel"
      id="phone"
      name="phone"
      [(ngModel)]="registerData.phone"
      placeholder="Phone number (e.g. 01012345678)"
      required
      class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm placeholder-gray-400"
    />
  </div>

  <!-- Password -->
  <div class="relative">
    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
      <i class="fas fa-key"></i>
    </span>
    <input
      [type]="showPassword ? 'text' : 'password'"
      id="password"
      name="password"
      [(ngModel)]="registerData.password"
      (ngModelChange)="checkPasswordStrength()"
      placeholder="Password (min 8 characters)"
      required
      minlength="8"
      class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm placeholder-gray-400"
    />
    <button
      type="button"
      (click)="showPassword = !showPassword"
      class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600"
    >
      <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
    </button>
  </div>
  @if (passwordStrength) {
    <p
      [class]="passwordStrength === 'Strong' ? 'text-green-600' : passwordStrength === 'Medium' ? 'text-yellow-600' : 'text-red-500'"
      class="text-xs font-semibold -mt-2"
    >
      Password strength: {{ passwordStrength }}
    </p>
  }

  <!-- Confirm Password -->
  <div class="relative">
    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
      <i class="fas fa-lock"></i>
    </span>
    <input
      type="password"
      id="rePassword"
      name="rePassword"
      [(ngModel)]="registerData.rePassword"
      placeholder="Confirm password"
      required
      class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm placeholder-gray-400"
    />
  </div>

  <!-- Terms -->
  <div class="flex items-start gap-2">
    <input
      type="checkbox"
      id="terms"
      name="terms"
      [(ngModel)]="agreeToTerms"
      class="w-4 h-4 mt-0.5 accent-[#1a3566] cursor-pointer"
    />
    <label for="terms" class="text-xs text-gray-600 leading-relaxed">
      I agree to the
      <a href="#" class="text-blue-600 hover:underline">Terms of Service</a>
      and
      <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>
    </label>
  </div>

  <!-- Register Button -->
  <button
    type="submit"
    [disabled]="isLoading()"
    class="w-full bg-[#1a3566] text-white py-3 rounded-lg font-bold text-base hover:bg-[#152b52] transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
  >
    {{ isLoading() ? 'Creating Account...' : 'Create Account' }}
  </button>
</form>
